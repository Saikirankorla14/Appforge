<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppForge — AI App Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #6B46C1;
      --brand-hover: #553C9A;
      --bg: #0f0f13;
      --bg2: #18181f;
      --bg3: #202028;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f4;
      --muted: #8884a0;
      --hint: #56546a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .logo {
      width: 32px; height: 32px;
      background: var(--brand);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .brand { font-size: 16px; font-weight: 600; }
    .brand span { color: var(--brand); }
    .badge {
      font-size: 10px; font-weight: 500;
      background: rgba(107,70,193,0.2);
      color: #a78bfa;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(107,70,193,0.3);
    }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .model-pill {
      font-size: 11px; color: var(--muted);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--hint);
      padding: 4px 6px 8px;
    }
    .chip {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-align: left;
      line-height: 1.45;
      transition: all .15s;
    }
    .chip:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

    /* ── Workspace ── */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Prompt bar ── */
    .prompt-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .prompt-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea#prompt {
      flex: 1;
      resize: none;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 72px;
      line-height: 1.55;
      transition: border-color .15s;
    }
    textarea#prompt::placeholder { color: var(--hint); }
    textarea#prompt:focus { outline: none; border-color: var(--brand); }
    .gen-btn {
      padding: 10px 20px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: background .15s, transform .1s;
      height: 40px;
    }
    .gen-btn:hover:not(:disabled) { background: var(--brand-hover); }
    .gen-btn:active:not(:disabled) { transform: scale(0.97); }
    .gen-btn:disabled { opacity: .45; cursor: not-allowed; }
    .hint-text { font-size: 11px; color: var(--hint); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s;
      user-select: none;
    }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 500; }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Output ── */
    .output-area {
      flex: 1;
      position: relative;
      min-height: 0;
      background: var(--bg);
    }
    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      gap: 14px;
      color: var(--hint);
    }
    .placeholder-icon { font-size: 48px; opacity: .25; }
    #placeholder p { font-size: 13px; }
    iframe#previewFrame {
      width: 100%; height: 100%;
      border: none;
      min-height: 400px;
      display: none;
      background: #fff;
    }
    #codeView {
      display: none;
      padding: 20px;
      overflow: auto;
      max-height: 500px;
    }
    #codeView pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #a0a0c0;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.65;
    }

    /* ── Status bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      min-height: 36px;
      flex-shrink: 0;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--hint); }
    .dot.active { background: var(--brand); animation: pulse 1s infinite; }
    .dot.ok { background: #22c55e; animation: none; }
    .dot.err { background: #ef4444; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .spacer { flex: 1; }
    .dl-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s;
    }
    .dl-btn:hover { background: var(--bg3); color: var(--text); }
    .dl-btn.show { display: flex; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <span class="brand"><span>App</span>Forge</span>
  <span class="badge">Groq-powered</span>
  <div class="header-right">
    <span class="model-pill">llama-3.3-70b-versatile</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Quick ideas</div>
    <button class="chip" onclick="setPrompt(this.textContent)">Todo app with dark mode and local storage</button>
    <button class="chip" onclick="setPrompt(this.textContent)">BMI calculator with a visual gauge</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Pomodoro timer with sound alerts</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Budget tracker with pie chart</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Flashcard quiz app with score tracking</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Color palette generator from hex input</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Markdown previewer with side-by-side view</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Random password generator with strength meter</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Unit converter for length, weight, temperature</button>
    <button class="chip" onclick="setPrompt(this.textContent)">Typing speed test with WPM counter</button>
  </aside>

  <div class="workspace">
    <div class="prompt-bar">
      <div class="prompt-row">
        <textarea id="prompt" placeholder="Describe the web app you want to build… e.g. 'A habit tracker with streaks and a calendar heatmap'"></textarea>
        <button class="gen-btn" id="genBtn" onclick="generate()">
          ▶ Generate
        </button>
      </div>
      <div class="hint-text">Press Ctrl+Enter to generate &nbsp;·&nbsp; API key is loaded from server .env</div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-preview" onclick="switchTab('preview')">Preview</div>
      <div class="tab" id="tab-code" onclick="switchTab('code')">HTML source</div>
    </div>

    <div class="output-area" id="outputArea">
      <div id="placeholder">
        <div class="placeholder-icon">🖥</div>
        <p>Your generated app will appear here</p>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-forms allow-modals"></iframe>
      <div id="codeView"><pre id="codeText"></pre></div>
    </div>

    <div class="statusbar">
      <div class="dot" id="dot"></div>
      <span id="statusMsg">Ready — describe your app and hit Generate.</span>
      <div class="spacer"></div>
      <button class="dl-btn" id="dlBtn" onclick="downloadHTML()">⬇ Download HTML</button>
    </div>
  </div>
</div>

<script>
let generatedHTML = '';
let currentTab = 'preview';

function setPrompt(text) {
  document.getElementById('prompt').value = text;
  document.getElementById('prompt').focus();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-preview').className = 'tab' + (tab === 'preview' ? ' active' : '');
  document.getElementById('tab-code').className = 'tab' + (tab === 'code' ? ' active' : '');
  if (!generatedHTML) return;
  document.getElementById('previewFrame').style.display = tab === 'preview' ? 'block' : 'none';
  document.getElementById('codeView').style.display = tab === 'code' ? 'block' : 'none';
}

function setStatus(msg, state) {
  document.getElementById('statusMsg').textContent = msg;
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + (state || '');
}

function showResult(html) {
  generatedHTML = html;
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('previewFrame').style.display = currentTab === 'preview' ? 'block' : 'none';
  document.getElementById('codeView').style.display = currentTab === 'code' ? 'block' : 'none';
  document.getElementById('previewFrame').srcdoc = html;
  document.getElementById('codeText').textContent = html;
  document.getElementById('dlBtn').classList.add('show');
}

function downloadHTML() {
  if (!generatedHTML) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([generatedHTML], { type: 'text/html' }));
  a.download = 'generated-app.html';
  a.click();
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { setStatus('Please describe the app you want to build.', 'err'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  setStatus('Generating with Groq…', 'active');

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Unknown error');

    showResult(data.html);
    setStatus('Done — preview your app or switch to HTML source.', 'ok');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
});
</script>
</body>
</html>
